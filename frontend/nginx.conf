server {
    listen 80;
    server_name _;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — send all unknown paths to index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to the FastAPI backend service ──────────────────────
    # Matches /urls, /urls/*, /health-checks, /health-checks/*
    location ~ ^/(urls|health-checks)(/.*)?$ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # FastAPI auto-generated docs (optional convenience)
    location ~ ^/(docs|openapi.json|redoc)$ {
        proxy_pass http://backend:8000;
    }
}
